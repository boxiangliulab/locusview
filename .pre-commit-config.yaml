# Pre-commit hooks run automatically before each commit. They are the first line
# of the safety harness (see docs/process/agent-workflow.md): they catch lint
# issues, secrets, and oversized files BEFORE they ever reach a branch.
#
# Setup once per clone:  uv run pre-commit install
# Run on everything:     uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff            # lint (with autofix)
        args: [--fix]
      - id: ruff-format     # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files   # block accidental multi-MB data commits
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks        # scan for secrets/tokens on every commit
